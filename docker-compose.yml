version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-hooks-backend
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - demo-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-hooks-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - demo-net

networks:
  demo-net:
    driver: bridge
